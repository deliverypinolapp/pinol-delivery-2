<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PinolApp PRO+</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container">

    <!-- LOGIN -->
    <div id="login" class="card">
      <h2>Iniciar sesión</h2>
      <input type="text" id="usuario" placeholder="Usuario" />
      <input type="password" id="clave" placeholder="Contraseña" />
      <button onclick="login()">Entrar</button>
      <p id="mensaje" class="msg"></p>
      <button class="link" onclick="mostrarRegistro()">Crear cuenta</button>
    </div>

    <!-- REGISTRO -->
    <div id="registro" class="card hidden">
      <h2>Crear cuenta</h2>
      <input type="text" id="nuevoUser" placeholder="Nuevo usuario" />
      <input type="password" id="nuevoPass" placeholder="Nueva contraseña" />
      <button onclick="registrar()">Registrarse</button>
      <button class="link" onclick="volverLogin()">Volver</button>
      <p id="mensajeRegistro" class="msg"></p>
    </div>

    <!-- PANEL -->
    <div id="panel" class="card hidden">
      <h2>Bienvenido 👋</h2>
      <p id="userText"></p>
      <button onclick="logout()">Cerrar sesión</button>
    </div>

  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
